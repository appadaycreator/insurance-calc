<h1>📋 使い方</h1><h2>入力タブ</h2><p>基本情報（年齢・家族構成・雇用形態）と収入・住宅状況を入力し「診断する」ボタンを押してください。現在の保険料も入力すると過剰・不足の判定ができます。</p><h2>診断結果タブ</h2><p>生命保険の必要額（内訳付き）・医療保険の推奨日額・就業不能保険の推奨月額が表示されます。</p><h2>見直しタブ</h2><p>現在の保険料と必要額を比較して過剰・不足を判定します。</p>
